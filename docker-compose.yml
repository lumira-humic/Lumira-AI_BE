services:
  redis:
    image: redis:latest
    container_name: lumira_redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    volumes:
      - redis_data:/data
    networks:
      - lumira_network

volumes:
  postgres_data:
  redis_data:

networks:
  lumira_network:
    driver: bridge
